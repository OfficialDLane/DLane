<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyWorship - Pro Interface</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="menu-bar">
      <div class="logo-title">EasyWorship - Default</div>
      <nav class="nav-links">
        <span>File</span>
        <span>Edit</span>
        <span>Live</span>
        <span>Profiles</span>
        <span>View</span>
        <span>Help</span>
      </nav>
    </header>

    <section class="toolbar">
      <div class="toolbar-group left">
        <button class="tool-btn"><span class="icon">➕</span>New</button>
        <button class="tool-btn"><span class="icon">📂</span>Open</button>
        <button class="tool-btn"><span class="icon">💾</span>Save</button>
        <button class="tool-btn"><span class="icon">🛒</span>Store</button>
        <button class="tool-btn"><span class="icon">🌐</span>Web</button>
        <button class="tool-btn"><span class="icon">📶</span>Remote</button>
      </div>
      <div class="toolbar-group right">
        <button class="tool-btn active-green" id="btn-go-live"><span class="icon">▶</span>Go Live</button>
        <button class="tool-btn"><span class="icon">🔔</span>Alerts</button>
        <button class="tool-btn"><span class="icon">🖼</span>Logo</button>
        <button class="tool-btn" id="btn-black"><span class="icon">⬛</span>Black</button>
        <button class="tool-btn" id="btn-clear"><span class="icon">❌</span>Clear</button>
        <button class="tool-btn live-indicator"><span class="icon">📺</span>Live</button>
      </div>
    </section>

    <main class="workspace">
      
      <div class="upper-panels">
        <div class="panel schedule-panel">
          <div class="panel-header">Schedule</div>
          <div class="panel-content empty-dark">
            <ul id="schedule-list">
              <li>Sunday Morning Service</li>
              <li class="sub-item">Welcome Graphics</li>
              <li class="sub-item">10,000 Reasons</li>
            </ul>
          </div>
        </div>

        <div class="panel preview-panel">
          <div class="panel-header">Preview</div>
          <div class="preview-main empty-dark screen-container">
            <div id="preview-screen" class="display-screen">Select a song to preview...</div>
          </div>
          <div class="panel-header sub-header">Preview Output</div>
          <div class="preview-output empty-dark">
            <div class="mini-screen" id="mini-preview"></div>
          </div>
        </div>

        <div class="panel live-panel">
          <div class="panel-header live-header">Live Output</div>
          <div class="live-main empty-dark screen-container">
            <div id="live-screen" class="display-screen">
            </div>
          </div>
        </div>
      </div>

      <div class="lower-resources">
        <div class="resource-tabs">
          <button class="tab-btn active" data-tab="songs">Songs</button>
          <button class="tab-btn" data-tab="scriptures">Scriptures</button>
          <button class="tab-btn" data-tab="media">Media</button>
          <button class="tab-btn" data-tab="presentations">Presentations</button>
          <button class="tab-btn" data-tab="themes">Themes</button>
        </div>

        <div class="resource-body">
          <aside class="resource-sidebar">
            <div class="sidebar-section active">SONGS</div>
            <ul class="sidebar-list">
              <li class="active">🎵 All Songs</li>
            </ul>
            <div class="sidebar-section">ONLINE</div>
            <ul class="sidebar-list">
              <li>🌐 SongSelect</li>
            </ul>
          </aside>

          <section class="resource-table-container">

    <!-- Resource Toolbar -->
    <div class="resource-toolbar">

        <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="🔍 Search songs..."
        >

        <div class="resource-buttons">
            <button id="btn-add-song">➕ Add</button>
            <button id="btn-edit-song">✏ Edit</button>
            <button id="btn-delete-song">🗑 Delete</button>
        </div>

    </div>
            <div class="table-scroll">
              <table class="resource-table" id="data-table">
                <thead>
                  <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Copyright</th>
                  </tr>
                </thead>
                <tbody id="table-body">
                  </tbody>
              </table>
            </div>
            <footer class="table-footer">
              <div class="footer-left">➕ ⚙</div>
              <div class="footer-center" id="song-count">0 items</div>
              <div class="footer-right" id="system-clock">00:00:00</div>
            </footer>
          </section>
        </div>
      </div>

    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
